version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: opticrop_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opticrop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: opticrop_cache
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opticrop_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/opticrop
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRET_KEY=supersecretkeyforopticropdevelopment2026
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opticrop_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
